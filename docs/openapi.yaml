openapi: "3.0.3"
info:
  title: Systeme de Gestion Commerciale API
  description: |
    API REST complete pour le systeme de gestion commerciale.
    Authentification via JWT cookies HttpOnly.
    Multi-tenant : Enterprise > Store.
    Roles : ADMIN, MANAGER, SALES, COMMERCIAL, HR, CASHIER, STOCKER.
  version: "1.0.0"
  contact:
    name: Equipe Technique

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Auth
    description: Authentification et gestion de session
  - name: Enterprises
    description: Gestion des entreprises
  - name: Subscriptions
    description: Abonnements et facturation
  - name: Stores
    description: Gestion des magasins
  - name: Users
    description: Gestion des utilisateurs et roles
  - name: Catalog
    description: Produits, categories, marques
  - name: Stock
    description: Stock, mouvements, transferts, inventaires
  - name: Customers
    description: Gestion des clients
  - name: Sales
    description: Ventes (POS)
  - name: Quotes
    description: Devis et factures proforma
  - name: Payments
    description: Paiements
  - name: CashShifts
    description: Sessions de caisse
  - name: Credits
    description: Comptes credit et echeanciers
  - name: Refunds
    description: Remboursements et avoirs
  - name: Purchases
    description: Fournisseurs et bons de commande
  - name: Alerts
    description: Centre d'alertes
  - name: AuditLogs
    description: Journal d'audit
  - name: Reports
    description: Rapports et KPIs
  - name: Analytics
    description: Analytics avancees
  - name: AnalyticsCustomers
    description: Analytics clients
  - name: AnalyticsCashier
    description: Analytics caissier
  - name: AnalyticsStock
    description: Analytics stock
  - name: DG
    description: Dashboard direction generale
  - name: Expenses
    description: Gestion des depenses
  - name: Objectives
    description: Objectifs vendeurs
  - name: Commercial
    description: CRM commercial
  - name: HRM
    description: Gestion des ressources humaines
  - name: Documents
    description: Verification de documents

security:
  - cookieAuth: []

paths:
  # ─── AUTH ────────────────────────────────────────────
  /auth/token/:
    post:
      tags: [Auth]
      summary: Obtenir JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Tokens definis en cookies HttpOnly
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/MeUser" }

  /auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Rafraichir le token d'acces
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh: { type: string, description: "Optionnel si cookie present" }
      responses:
        "200":
          description: Token rafraichi
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail: { type: string }

  /auth/logout/:
    post:
      tags: [Auth]
      summary: Supprimer cookies auth
      security: []
      responses:
        "204": { description: Deconnecte }

  /auth/csrf/:
    get:
      tags: [Auth]
      summary: Obtenir token CSRF
      security: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken: { type: string }

  /auth/me/:
    get:
      tags: [Auth]
      summary: Profil utilisateur connecte
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeUser" }
    patch:
      tags: [Auth]
      summary: Mettre a jour le profil
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeUser" }

  /auth/module-matrix/:
    get:
      tags: [Auth]
      summary: Matrice modules/fonctionnalites du store
      parameters:
        - name: store
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  store_id: { type: string, format: uuid }
                  modules: { type: object }
                  features: { type: object }
                  capabilities: { type: array, items: { type: string } }

  /auth/password/change/:
    post:
      tags: [Auth]
      summary: Changer son mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200": { description: Mot de passe change }

  /auth/password/reset/:
    post:
      tags: [Auth]
      summary: Demander reinitialisation mot de passe
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail: { type: string }

  /auth/password/reset/confirm/:
    post:
      tags: [Auth]
      summary: Confirmer reinitialisation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid, token, new_password1, new_password2]
              properties:
                uid: { type: string }
                token: { type: string }
                new_password1: { type: string }
                new_password2: { type: string }
      responses:
        "200": { description: Mot de passe reinitialise }

  # ─── ENTERPRISES ─────────────────────────────────────
  /enterprises/:
    get:
      tags: [Enterprises]
      summary: Lister les entreprises
      parameters:
        - { name: is_active, in: query, schema: { type: boolean } }
        - { name: search, in: query, schema: { type: string } }
        - { name: ordering, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Enterprises]
      summary: Creer une entreprise
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Enterprise" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enterprise" }

  /enterprises/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Enterprises]
      summary: Detail entreprise
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enterprise" }
    patch:
      tags: [Enterprises]
      summary: Modifier entreprise
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Enterprise" }
    delete:
      tags: [Enterprises]
      summary: Supprimer entreprise
      responses:
        "204": { description: Supprimee }

  /enterprises/{id}/setup/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Enterprises]
      summary: Configuration initiale (entreprise + magasin + admin)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnterpriseSetup" }
      responses:
        "201": { description: Configuration terminee }

  /enterprises/{id}/toggle-active/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Enterprises]
      summary: Activer/desactiver
      responses:
        "200": { description: Statut modifie }

  # ─── STORES ──────────────────────────────────────────
  /stores/:
    get:
      tags: [Stores]
      summary: Lister les magasins
      parameters:
        - { name: is_active, in: query, schema: { type: boolean } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Stores]
      summary: Creer un magasin
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Store" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }

  /stores/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Stores]
      summary: Detail magasin
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }
    patch:
      tags: [Stores]
      summary: Modifier magasin
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }

  /stores/my-stores/:
    get:
      tags: [Stores]
      summary: Magasins de l'utilisateur
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MyStore" }

  # ─── USERS ──────────────────────────────────────────
  /users/:
    get:
      tags: [Users]
      summary: Lister les utilisateurs
      parameters:
        - { name: role, in: query, schema: { type: string, enum: [ADMIN, MANAGER, SALES, COMMERCIAL, HR, CASHIER, STOCKER] } }
        - { name: is_active, in: query, schema: { type: boolean } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Users]
      summary: Creer un utilisateur
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /users/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Users]
      summary: Detail utilisateur
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    patch:
      tags: [Users]
      summary: Modifier utilisateur
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /users/{id}/toggle-active/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Users]
      summary: Activer/desactiver
      responses:
        "200": { description: Statut modifie }

  # ─── PRODUCTS ────────────────────────────────────────
  /products/:
    get:
      tags: [Catalog]
      summary: Lister les produits
      parameters:
        - { name: category, in: query, schema: { type: string, format: uuid } }
        - { name: brand, in: query, schema: { type: string, format: uuid } }
        - { name: is_active, in: query, schema: { type: boolean } }
        - { name: search, in: query, schema: { type: string } }
        - { name: ordering, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Catalog]
      summary: Creer un produit
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Product" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /products/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Catalog]
      summary: Detail produit
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    patch:
      tags: [Catalog]
      summary: Modifier produit
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    delete:
      tags: [Catalog]
      summary: Supprimer produit
      responses:
        "204": { description: Supprime }

  /products/pos/:
    get:
      tags: [Catalog]
      summary: Produits optimises POS
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProductPOS" }

  /products/import-csv/:
    post:
      tags: [Catalog]
      summary: Import produits CSV
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200": { description: Import termine }

  /products/export-csv/:
    get:
      tags: [Catalog]
      summary: Export produits CSV
      responses:
        "200":
          content:
            text/csv:
              schema: { type: string }

  /categories/:
    get:
      tags: [Catalog]
      summary: Lister les categories
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Catalog]
      summary: Creer une categorie
      responses:
        "201": { description: Creee }

  /brands/:
    get:
      tags: [Catalog]
      summary: Lister les marques
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Catalog]
      summary: Creer une marque
      responses:
        "201": { description: Creee }

  # ─── STOCK ──────────────────────────────────────────
  /stock/:
    get:
      tags: [Stock]
      summary: Niveaux de stock
      parameters:
        - { name: store, in: query, schema: { type: string, format: uuid } }
        - { name: product, in: query, schema: { type: string, format: uuid } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }

  /stock/bulk-entry/:
    post:
      tags: [Stock]
      summary: Entree de stock en masse
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkStockEntry" }
      responses:
        "200": { description: Stock mis a jour }

  /stock/bulk-adjust/:
    post:
      tags: [Stock]
      summary: Ajustement de stock en masse
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkStockAdjust" }
      responses:
        "200": { description: Stock ajuste }

  /stock-movements/:
    get:
      tags: [Stock]
      summary: Historique mouvements de stock
      parameters:
        - { name: store, in: query, schema: { type: string, format: uuid } }
        - { name: product, in: query, schema: { type: string, format: uuid } }
        - { name: movement_type, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }

  /stock-transfers/:
    get:
      tags: [Stock]
      summary: Lister les transferts
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Stock]
      summary: Creer un transfert
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockTransferCreate" }
      responses:
        "201": { description: Transfert cree }

  /stock-transfers/{id}/approve/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Stock]
      summary: Approuver un transfert
      responses:
        "200": { description: Approuve }

  /stock-transfers/{id}/receive/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Stock]
      summary: Recevoir un transfert
      responses:
        "200": { description: Recu }

  # ─── CUSTOMERS ───────────────────────────────────────
  /customers/:
    get:
      tags: [Customers]
      summary: Lister les clients
      parameters:
        - { name: is_active, in: query, schema: { type: boolean } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Customers]
      summary: Creer un client
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Customer" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }

  /customers/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Customers]
      summary: Detail client
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }

  /customers/{id}/purchase-history/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Customers]
      summary: Historique achats client
      responses:
        "200": { description: Liste des ventes }

  # ─── SALES ──────────────────────────────────────────
  /sales/:
    get:
      tags: [Sales]
      summary: Lister les ventes
      parameters:
        - { name: store, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string, enum: [DRAFT, PENDING_PAYMENT, PAID, PARTIALLY_PAID, CANCELLED, REFUNDED] } }
        - { name: seller, in: query, schema: { type: string, format: uuid } }
        - { name: customer, in: query, schema: { type: string, format: uuid } }
        - { name: is_credit_sale, in: query, schema: { type: boolean } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Sales]
      summary: Creer une vente
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaleCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sale" }

  /sales/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Sales]
      summary: Detail vente
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sale" }

  /sales/{id}/add-item/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Sales]
      summary: Ajouter un article
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaleAddItem" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sale" }

  /sales/{id}/submit/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Sales]
      summary: Soumettre la vente en caisse
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sale" }

  /sales/{id}/cancel/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Sales]
      summary: Annuler la vente
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sale" }

  /sales/{id}/invoice/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Sales]
      summary: Telecharger facture PDF
      responses:
        "200":
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /sales/{id}/receipt/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Sales]
      summary: Telecharger recu PDF
      responses:
        "200":
          content:
            application/pdf:
              schema: { type: string, format: binary }

  # ─── QUOTES ─────────────────────────────────────────
  /quotes/:
    get:
      tags: [Quotes]
      summary: Lister les devis/proformas
      parameters:
        - { name: store, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string, enum: [DRAFT, SENT, ACCEPTED, REFUSED, CONVERTED, CANCELLED] } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedResponse" }
    post:
      tags: [Quotes]
      summary: Creer un devis/proforma
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteCreate" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /quotes/{id}/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Quotes]
      summary: Detail devis
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /quotes/{id}/send/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Quotes]
      summary: Envoyer au client
      responses:
        "200": { description: Envoye }

  /quotes/{id}/accept/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Quotes]
      summary: Marquer comme accepte
      responses:
        "200": { description: Accepte }

  /quotes/{id}/convert/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Quotes]
      summary: Convertir en vente
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sale" }

  /quotes/{id}/cancel/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    post:
      tags: [Quotes]
      summary: Annuler le devis
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: Annule }

  /quotes/{id}/pdf/:
    parameters:
      - { $ref: "#/components/parameters/ResourceId" }
    get:
      tags: [Quotes]
      summary: Telecharger PDF
      responses:
        "200":
          content:
            application/pdf:
              schema: { type: string, format: binary }

  # ─── PAYMENTS ────────────────────────────────────────
  /payments/:
    get:
      tags: [Payments]
      summary: Lister les paiements
      parameters:
