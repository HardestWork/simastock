  # ─── DOCUMENT VERIFICATION ─────────────────────────
  /documents/verify/{token}/:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Documents]
      summary: Verifier authenticite d'un document
      security: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  document_type: { type: string }
                  number: { type: string }
                  date: { type: string, format: date }
                  store: { type: string }
                  total: { type: number }
        "404":
          description: Document introuvable

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWT access token en cookie HttpOnly

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1

  schemas:
    PaginatedResponse:
      type: object
      properties:
        count: { type: integer }
        next: { type: string, nullable: true }
        previous: { type: string, nullable: true }
        results: { type: array, items: {} }

    MeUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        role: { type: string, enum: [ADMIN, MANAGER, SALES, COMMERCIAL, HR, CASHIER, STOCKER] }
        is_active: { type: boolean }
        is_superuser: { type: boolean }

    Enterprise:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        name: { type: string }
        code: { type: string }
        legal_name: { type: string }
        currency: { type: string, default: FCFA }
        vat_enabled: { type: boolean }
        vat_rate: { type: number }
        email: { type: string }
        phone: { type: string }
        is_active: { type: boolean }
        subscription_start: { type: string, format: date }
        subscription_end: { type: string, format: date }
        subscription_status: { type: string, readOnly: true }

    EnterpriseSetup:
      type: object
      required: [enterprise_name, enterprise_code, store_name, store_code, user_email, user_password, user_password_confirm]
      properties:
        enterprise_name: { type: string }
        enterprise_code: { type: string }
        enterprise_currency: { type: string }
        store_name: { type: string }
        store_code: { type: string }
        user_email: { type: string, format: email }
        user_first_name: { type: string }
        user_last_name: { type: string }
        user_password: { type: string, minLength: 8 }
        user_password_confirm: { type: string, minLength: 8 }

    Store:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        enterprise: { type: string, format: uuid, readOnly: true }
        name: { type: string }
        code: { type: string }
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        currency: { type: string }
        stock_decrement_on: { type: string, enum: [PAYMENT, VALIDATION] }
        allow_negative_stock: { type: boolean }
        is_active: { type: boolean }

    MyStore:
      type: object
      properties:
        id: { type: string, format: uuid }
        enterprise: { type: string, format: uuid }
        enterprise_name: { type: string }
        name: { type: string }
        code: { type: string }
        is_default: { type: boolean }
        my_capabilities: { type: array, items: { type: string } }
        effective_feature_flags: { type: object }

    User:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        role: { type: string, readOnly: true }
        custom_role: { type: string, format: uuid, nullable: true }
        custom_role_name: { type: string, readOnly: true }
        is_active: { type: boolean }

    UserCreate:
      type: object
      required: [email, role, password, password_confirm]
      properties:
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        role: { type: string, enum: [ADMIN, MANAGER, SALES, COMMERCIAL, HR, CASHIER, STOCKER] }
        custom_role: { type: string, format: uuid, nullable: true }
        password: { type: string, minLength: 8 }
        password_confirm: { type: string, minLength: 8 }

    Product:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        enterprise: { type: string, format: uuid, readOnly: true }
        name: { type: string }
        sku: { type: string }
        barcode: { type: string }
        description: { type: string }
        category: { type: string, format: uuid }
        category_name: { type: string, readOnly: true }
        brand: { type: string, format: uuid, nullable: true }
        brand_name: { type: string, readOnly: true }
        product_type: { type: string, enum: [PHYSICAL, SERVICE] }
        track_stock: { type: boolean }
        cost_price: { type: number }
        selling_price: { type: number }
        is_active: { type: boolean }
        images:
          type: array
          readOnly: true
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              image: { type: string }
              is_primary: { type: boolean }

    ProductPOS:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        sku: { type: string }
        barcode: { type: string }
        selling_price: { type: number }
        product_type: { type: string }
        track_stock: { type: boolean }
        available_qty: { type: integer }
        has_stock: { type: boolean }

    Customer:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        enterprise: { type: string, format: uuid, readOnly: true }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        company: { type: string }
        full_name: { type: string, readOnly: true }
        is_default: { type: boolean, readOnly: true }

    SaleItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        product: { type: string, format: uuid }
        product_name: { type: string }
        unit_price: { type: number }
        quantity: { type: integer }
        discount_amount: { type: number }
        line_total: { type: number, readOnly: true }

    Sale:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        store: { type: string, format: uuid }
        seller: { type: string, format: uuid }
        seller_name: { type: string, readOnly: true }
        customer: { type: string, format: uuid, nullable: true }
        customer_name: { type: string, readOnly: true }
        invoice_number: { type: string, readOnly: true }
        status: { type: string, enum: [DRAFT, PENDING_PAYMENT, PAID, PARTIALLY_PAID, CANCELLED, REFUNDED] }
        payment_status: { type: string, enum: [N/A, UNPAID, PARTIAL, PAID], readOnly: true }
        subtotal: { type: number, readOnly: true }
        discount_amount: { type: number }
        discount_percent: { type: number }
        tax_amount: { type: number, readOnly: true }
        total: { type: number, readOnly: true }
        amount_paid: { type: number, readOnly: true }
        amount_due: { type: number, readOnly: true }
        is_credit_sale: { type: boolean }
        notes: { type: string }
        items:
          type: array
          readOnly: true
          items: { $ref: "#/components/schemas/SaleItem" }
        created_at: { type: string, format: date-time, readOnly: true }

    SaleCreate:
      type: object
      properties:
        customer_id: { type: string, format: uuid, nullable: true }
        store_id: { type: string, format: uuid }
        discount_percent: { type: number, default: 0 }
        notes: { type: string }

    SaleAddItem:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        discount_amount: { type: number, default: 0 }
        unit_price_override: { type: number, nullable: true }

    Quote:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        store: { type: string, format: uuid }
        quote_number: { type: string, readOnly: true }
        status: { type: string, enum: [DRAFT, SENT, ACCEPTED, REFUSED, CONVERTED, CANCELLED] }
        document_type: { type: string, enum: [DEVIS, PROFORMA] }
        customer: { type: string, format: uuid, nullable: true }
        customer_name: { type: string, readOnly: true }
        subtotal: { type: number, readOnly: true }
        total: { type: number, readOnly: true }
        valid_until: { type: string, format: date, nullable: true }
        notes: { type: string }
        conditions: { type: string }
        cancelled_at: { type: string, format: date-time, readOnly: true, nullable: true }
        cancellation_reason: { type: string }
        converted_sale_id: { type: string, format: uuid, readOnly: true, nullable: true }
        is_expired: { type: boolean, readOnly: true }
        items:
          type: array
          readOnly: true
          items: { $ref: "#/components/schemas/SaleItem" }

    QuoteCreate:
      type: object
      properties:
        store_id: { type: string, format: uuid }
        customer_id: { type: string, format: uuid, nullable: true }
        document_type: { type: string, enum: [DEVIS, PROFORMA], default: DEVIS }
        discount_percent: { type: number, default: 0 }
        notes: { type: string }
        conditions: { type: string }
        valid_until: { type: string, format: date }

    PaymentCreate:
      type: object
      required: [sale_id, payments]
      properties:
        sale_id: { type: string, format: uuid }
        payments:
          type: array
          minItems: 1
          items:
            type: object
            required: [method, amount]
            properties:
              method: { type: string, enum: [CASH, CARD, MOBILE_MONEY, BANK_TRANSFER, CHECK] }
              amount: { type: number }
              reference: { type: string }

    CashShift:
      type: object
      properties:
        id: { type: string, format: uuid }
        store: { type: string, format: uuid }
        cashier: { type: string, format: uuid }
        status: { type: string, enum: [OPEN, CLOSED] }
        opened_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }
        opening_float: { type: number }
        expected_cash: { type: number }
        closing_cash: { type: number, nullable: true }
        variance: { type: number, nullable: true }

    Refund:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        sale: { type: string, format: uuid }
        store: { type: string, format: uuid, readOnly: true }
        amount: { type: number }
        reason: { type: string }
        refund_method: { type: string }
        credit_note_number: { type: string, readOnly: true }
        restore_stock: { type: boolean }
        created_at: { type: string, format: date-time, readOnly: true }

    RefundCreate:
      type: object
      required: [sale_id, amount, reason, refund_method]
      properties:
        sale_id: { type: string, format: uuid }
        amount: { type: number, minimum: 0.01 }
        reason: { type: string }
        refund_method: { type: string, enum: [CASH, CARD, MOBILE_MONEY, BANK_TRANSFER] }
        restore_stock: { type: boolean, default: false }

    PurchaseOrderCreate:
      type: object
      required: [store, supplier, lines]
      properties:
        store: { type: string, format: uuid }
        supplier: { type: string, format: uuid }
        notes: { type: string }
        submit_now: { type: boolean, default: false }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity_ordered, unit_cost]
            properties:
              product_id: { type: string, format: uuid }
              quantity_ordered: { type: integer, minimum: 1 }
              unit_cost: { type: number, minimum: 0 }

    BulkStockEntry:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }
        reference: { type: string }
        reason: { type: string }

    BulkStockAdjust:
      type: object
      required: [adjustments]
      properties:
        adjustments:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: string, format: uuid }
              quantity: { type: integer }
        reason: { type: string }

    StockTransferCreate:
      type: object
      required: [to_store, lines]
      properties:
        to_store: { type: string, format: uuid }
        notes: { type: string }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }

    KPIs:
      type: object
      properties:
        total_sales: { type: number }
        total_orders: { type: integer }
        average_basket: { type: number }
        gross_margin: { type: number }
        total_discounts: { type: number }
        total_refunds: { type: number }
        net_sales: { type: number }
        credit_outstanding: { type: number }
        stock_value: { type: number }
        top_products: { type: array, items: { type: object } }
        sales_trend: { type: array, items: { type: object } }

    Error:
      type: object
      properties:
        detail: { type: string }
