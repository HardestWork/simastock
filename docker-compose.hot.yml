services:
  frontend:
    build: !reset null
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports: !override
      - "3000:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      web:
        condition: service_healthy

volumes:
  frontend_node_modules:
